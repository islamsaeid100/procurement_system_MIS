name: Build and Deploy Frontend

on:
  push:
    branches:
      - main  # هيشتغل لما ترفع كود (Push) على فرع main

permissions:
  contents: write # عشان الـ Action يقدر يرفع ملفات الـ Build

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # أو النسخة اللي شغال بيها

      - name: Install and Build
        run: |
          cd frontend  # <--- تأكد إن ده اسم فولدر الفرونت إند عندك بالظبط
          npm install
          npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist # <--- لو شغال Vite بيكون dist، لو React عادي بيكون build