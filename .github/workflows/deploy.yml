name: Build and Deploy Frontend

on:
  push:
    branches:
      - main  # هيشتغل لما ترفع كود على فرع main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          cd frontend  # <--- لو اسم فولدر الفرونت عندك مختلف، غيره هنا
          npm install
          npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist  # <--- لو بتستخدم React عادي غير dist لـ build