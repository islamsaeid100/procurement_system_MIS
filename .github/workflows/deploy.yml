name: Build and Deploy Frontend

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debugging Paths
        run: ls -R  # الخطوة دي عشان نشوف الملفات فين بالظبط لو فشل

      - name: Install and Build
        run: |
          # لو الـ package.json بره، هنشغل npm من بره
          # لو جوه الـ frontend، هنستخدم الـ flag --prefix
          if [ -f "package.json" ]; then
            npm install
            npm run build
          elif [ -f "frontend/package.json" ]; then
            cd frontend
            npm install
            npm run build
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # جرب تغيرها لـ ./build لو مانفعتش